name: pdf-ai-assistant

services:
  api:
    init: true
    image: crpi-efh1al370jt67g5v.cn-hangzhou.personal.cr.aliyuncs.com/wiki02/pdf-ai-api:latest
    env_file:
      - .env.production
    environment:
      DATABASE_URL: sqlite:////app/data/app.db
      UPLOAD_STORAGE_DIR: /app/data/uploads
      TZ: Asia/Shanghai
    volumes:
      - app_data:/app/data
      - chroma_data:/app/.chroma_db
      - model_cache:/home/app/.cache/huggingface
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    restart: unless-stopped
    stop_grace_period: 30s
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    init: true
    image: crpi-efh1al370jt67g5v.cn-hangzhou.personal.cr.aliyuncs.com/wiki02/pdf-ai-web:latest
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    stop_grace_period: 15s
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  app_data:
  chroma_data:
  model_cache:
